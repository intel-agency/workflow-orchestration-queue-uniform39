services:
  notifier:
    build:
      context: .
      dockerfile: Dockerfile.notifier
    ports:
      - "8000:8000"
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    networks:
      - orchestration
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sentinel:
    build:
      context: .
      dockerfile: Dockerfile.sentinel
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      SENTINEL_ID: ${SENTINEL_ID:-sentinel-01}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-60}
      TASK_TIMEOUT_MINUTES: ${TASK_TIMEOUT_MINUTES:-120}
      SHELL_BRIDGE_SCRIPT: /workspace/scripts/devcontainer-opencode.sh
    volumes:
      - worker_logs:/app/logs
      # Mount workspace for shell bridge access (ADR-07)
      - ${WORKSPACE_PATH:-.}:/workspace:ro
    networks:
      - orchestration
    # Resource constraints to prevent rogue agent DoS on host (see architecture.md)
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    restart: unless-stopped
    depends_on:
      notifier:
        condition: service_healthy

networks:
  orchestration:
    driver: bridge
    # Sentinel/Notifier need outbound internet access (GitHub API); not isolated
    internal: false

volumes:
  worker_logs:
    driver: local
